# Nautiloop auth-sidecar parity harness docker compose stack.
#
# Spec: `specs/sidecar-parity-harness.md`.
#
# The stack brings up the Go auth sidecar and the Rust auth sidecar
# side by side along with five mock services on a custom bridge
# network allocated from RFC6598 CGNAT space (100.64.0.0/24 by
# default, overridable via PARITY_NET_SUBNET or the driver's
# --subnet flag per FR-29).
#
# All `build.context` paths are set to the repo root (`../../..`)
# because the Go sidecar Dockerfile COPYs `images/sidecar/main.go`
# which lives outside this harness directory. Docker forbids
# parent-directory COPYs, so the only portable solution is to use
# the repo root as the build context.

services:
  # FR-2 #1: Go auth sidecar with the harness test CA baked into
  # the system trust bundle.
  sidecar-go:
    build:
      context: ../../..
      dockerfile: sidecar/tests/parity/Dockerfile.go-with-test-ca
    container_name: nautiloop-parity-sidecar-go
    ports:
      - "19090:9090"  # model proxy
      - "19091:9091"  # git ssh proxy
      - "19092:9092"  # egress
      - "19093:9093"  # health
    environment:
      GIT_REPO_URL: "git@github.com:test/repo.git"
    volumes:
      - ./fixtures/go-secrets:/secrets:ro
    networks:
      parity-net:
        ipv4_address: 100.64.0.20
    extra_hosts:
      - "api.openai.com:100.64.0.10"
      - "api.anthropic.com:100.64.0.11"
      - "github.com:100.64.0.12"
      - "mock-example:100.64.0.13"
      - "egress-target:100.64.0.14"
    mem_limit: 512m
    depends_on:
      mock-openai:
        condition: service_healthy
      mock-anthropic:
        condition: service_healthy
      mock-github-ssh:
        condition: service_healthy
      mock-example:
        condition: service_healthy
      mock-tcp-echo:
        condition: service_healthy

  # FR-2 #2: Rust auth sidecar. Uses the production Dockerfile
  # as-is (FR-6); the test CA is loaded at runtime via
  # NAUTILOOP_EXTRA_CA_BUNDLE, exercising the rustls extra-CA path.
  sidecar-rust:
    build:
      context: ../../..
      dockerfile: images/sidecar/Dockerfile
    container_name: nautiloop-parity-sidecar-rust
    ports:
      - "29090:9090"
      - "29091:9091"
      - "29092:9092"
      - "29093:9093"
    environment:
      GIT_REPO_URL: "git@github.com:test/repo.git"
      # SR-5: this env var is permitted ONLY here and in
      # `.github/workflows/parity.yml`. The script at
      # `sidecar/scripts/lint-no-test-utils-in-prod.sh` enforces the
      # allowlist.
      NAUTILOOP_EXTRA_CA_BUNDLE: "/test-ca/ca.pem"
    volumes:
      - ./fixtures/rust-secrets:/secrets:ro
      - ./fixtures/test-ca/ca.pem:/test-ca/ca.pem:ro
    networks:
      parity-net:
        ipv4_address: 100.64.0.21
    extra_hosts:
      - "api.openai.com:100.64.0.10"
      - "api.anthropic.com:100.64.0.11"
      - "github.com:100.64.0.12"
      - "mock-example:100.64.0.13"
      - "egress-target:100.64.0.14"
    mem_limit: 512m
    depends_on:
      mock-openai:
        condition: service_healthy
      mock-anthropic:
        condition: service_healthy
      mock-github-ssh:
        condition: service_healthy
      mock-example:
        condition: service_healthy
      mock-tcp-echo:
        condition: service_healthy

  # FR-2 #3: mock OpenAI (HTTPS with SAN=api.openai.com)
  mock-openai:
    build:
      context: ../../..
      dockerfile: sidecar/tests/parity/fixtures/mock-openai/Dockerfile
    container_name: nautiloop-parity-mock-openai
    ports:
      - "50010:80"      # plain HTTP healthcheck
      - "50011:443"     # HTTPS (manual smoke)
      - "49990:9999"    # introspection
    networks:
      parity-net:
        ipv4_address: 100.64.0.10
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:80/_healthz').read()"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 5s

  # FR-2 #4: mock Anthropic
  mock-anthropic:
    build:
      context: ../../..
      dockerfile: sidecar/tests/parity/fixtures/mock-anthropic/Dockerfile
    container_name: nautiloop-parity-mock-anthropic
    ports:
      - "50020:80"
      - "50021:443"
      - "49991:9999"
    networks:
      parity-net:
        ipv4_address: 100.64.0.11
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:80/_healthz').read()"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 5s

  # FR-2 #5: mock github SSH (paramiko). Port 22 is NOT published —
  # the sidecars reach it via parity-net.
  mock-github-ssh:
    build:
      context: ../../..
      dockerfile: sidecar/tests/parity/fixtures/mock-github-ssh/Dockerfile
    container_name: nautiloop-parity-mock-github-ssh
    ports:
      - "50030:2200"    # health TCP listener
      - "49992:9999"    # introspection
    networks:
      parity-net:
        ipv4_address: 100.64.0.12
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.socket(); s.settimeout(1.0); s.connect(('127.0.0.1', 2200)); s.close()"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 5s

  # FR-2 #6: mock example HTTP (dual port 80 + 8080)
  mock-example:
    build:
      context: ../../..
      dockerfile: sidecar/tests/parity/fixtures/mock-example-http/Dockerfile
    container_name: nautiloop-parity-mock-example
    ports:
      - "50040:80"
      - "50041:8080"
      - "49993:9999"
    networks:
      parity-net:
        ipv4_address: 100.64.0.13
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:80/_healthz').read()"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 5s

  # FR-2 #7: mock raw TCP echo (target for CONNECT tests + drain)
  mock-tcp-echo:
    build:
      context: ../../..
      dockerfile: sidecar/tests/parity/fixtures/mock-tcp-echo/Dockerfile
    container_name: nautiloop-parity-mock-tcp-echo
    ports:
      - "50050:443"
    networks:
      parity-net:
        ipv4_address: 100.64.0.14
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.socket(); s.settimeout(1.0); s.connect(('127.0.0.1', 443)); s.close()"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 5s

networks:
  parity-net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: ${PARITY_NET_SUBNET:-100.64.0.0/24}
